<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>充值 - AI UI 设计生成平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            accent: '#06b6d4',
          },
        },
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-md">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <i class="fa fa-paint-brush text-primary text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-800">AI UI 设计生成平台</h1>
      </div>
      <div class="flex items-center space-x-4">
        <span id="user-info" class="text-sm text-gray-600">
          <span id="nickname"></span> | 剩余次数: <span id="remain"></span>
        </span>
        <a href="/" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors">
          首页
        </a>
        <a href="/history" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors">
          历史记录
        </a>
        <button id="logout-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors">
          退出
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
      <h2 class="text-2xl font-bold mb-6 text-center">充值次数</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white rounded-lg shadow-md p-6 border-2 border-gray-200 hover:border-primary transition-colors cursor-pointer plan-card" data-times="10">
          <div class="text-center">
            <h3 class="text-lg font-semibold mb-2">基础套餐</h3>
            <div class="text-2xl font-bold text-primary mb-4">¥99</div>
            <p class="text-gray-600 mb-4">10次生成机会</p>
            <button class="w-full py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors">
              选择
            </button>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow-md p-6 border-2 border-primary transition-colors cursor-pointer plan-card" data-times="30">
          <div class="text-center">
            <div class="inline-block bg-primary text-white text-xs px-2 py-1 rounded-full mb-2">推荐</div>
            <h3 class="text-lg font-semibold mb-2">高级套餐</h3>
            <div class="text-2xl font-bold text-primary mb-4">¥249</div>
            <p class="text-gray-600 mb-4">30次生成机会</p>
            <button class="w-full py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors">
              选择
            </button>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow-md p-6 border-2 border-gray-200 hover:border-primary transition-colors cursor-pointer plan-card" data-times="100">
          <div class="text-center">
            <h3 class="text-lg font-semibold mb-2">专业套餐</h3>
            <div class="text-2xl font-bold text-primary mb-4">¥699</div>
            <p class="text-gray-600 mb-4">100次生成机会</p>
            <button class="w-full py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors">
              选择
            </button>
          </div>
        </div>
      </div>
      
      <div class="bg-white rounded-lg shadow-md p-6">
        <h3 class="text-lg font-semibold mb-4">支付方式</h3>
        <div class="space-y-4">
          <div class="flex items-center space-x-3">
            <input type="radio" id="wechat" name="payment" class="h-4 w-4 text-primary focus:ring-primary border-gray-300" checked>
            <label for="wechat" class="flex items-center space-x-2 cursor-pointer">
              <i class="fa fa-weixin text-green-500 text-xl"></i>
              <span>微信支付</span>
            </label>
          </div>
          <div class="flex items-center space-x-3">
            <input type="radio" id="alipay" name="payment" class="h-4 w-4 text-primary focus:ring-primary border-gray-300">
            <label for="alipay" class="flex items-center space-x-2 cursor-pointer">
              <i class="fa fa-credit-card text-blue-500 text-xl"></i>
              <span>支付宝</span>
            </label>
          </div>
          <div class="flex items-center space-x-3">
            <input type="radio" id="card" name="payment" class="h-4 w-4 text-primary focus:ring-primary border-gray-300">
            <label for="card" class="flex items-center space-x-2 cursor-pointer">
              <i class="fa fa-credit-card-alt text-purple-500 text-xl"></i>
              <span>银行卡</span>
            </label>
          </div>
        </div>
        
        <div class="mt-8">
          <button id="pay-btn" class="w-full py-3 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors">
            立即支付
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部信息 -->
  <footer class="bg-white border-t border-gray-200 mt-8 py-4">
    <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
      <p>AI UI 设计生成平台 - 基于豆包AI的智能设计工具</p>
    </div>
  </footer>

  <script>
    // 全局变量
    let token = localStorage.getItem('token');
    let selectedTimes = 30; // 默认选择高级套餐

    // DOM 元素
    const elements = {
      nickname: document.getElementById('nickname'),
      remain: document.getElementById('remain'),
      logoutBtn: document.getElementById('logout-btn'),
      planCards: document.querySelectorAll('.plan-card'),
      payBtn: document.getElementById('pay-btn')
    };

    // 初始化
    function init() {
      checkLogin();
      bindEvents();
    }

    // 检查登录状态
    function checkLogin() {
      if (!token) {
        window.location.href = '/login';
        return;
      }
      getUserInfo();
    }

    // 获取用户信息
    function getUserInfo() {
      fetch('/api/user/info', {
        headers: {
          'token': token
        }
      })
      .then(res => res.json())
      .then(data => {
        if (data.code === 0) {
          elements.nickname.textContent = data.data.nickname;
          elements.remain.textContent = data.data.remain;
        } else {
          localStorage.removeItem('token');
          window.location.href = '/login';
        }
      })
      .catch(err => {
        console.error('获取用户信息失败:', err);
        localStorage.removeItem('token');
        window.location.href = '/login';
      });
    }

    // 绑定事件
    function bindEvents() {
      // 退出登录
      elements.logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
      });

      // 选择套餐
      elements.planCards.forEach(card => {
        card.addEventListener('click', () => {
          // 移除所有卡片的选中状态
          elements.planCards.forEach(c => {
            c.classList.remove('border-primary');
            c.classList.add('border-gray-200');
          });
          // 添加当前卡片的选中状态
          card.classList.remove('border-gray-200');
          card.classList.add('border-primary');
          // 更新选中的次数
          selectedTimes = parseInt(card.dataset.times);
        });
      });

      // 支付
      elements.payBtn.addEventListener('click', () => {
        fetch('/api/pay/wxpay', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'token': token
          },
          body: JSON.stringify({ times: selectedTimes })
        })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            alert('支付成功');
            elements.remain.textContent = data.remain;
          } else {
            alert(data.msg);
          }
        })
        .catch(err => {
          console.error('支付失败:', err);
          alert('支付失败，请重试');
        });
      });
    }

    // 初始化
    init();
  </script>
</body>
</html>
